<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Incidencias</title>
</head>
<body>
    <h1>Listado de incidencias</h1>

    <ul>
        {% for incident in incidents %}
            <li>
                <strong>{{ incident.title }}</strong> -
                {{ incident.get_status_display }} -
                {{ incident.priority }}
            </li>
        {% empty %}
            <li>No hay incidencias.</li>
        {% endfor %}
    </ul>
</body>
</html>
